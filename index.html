  <body>
    <div id="root">
      <!--
        Static app shell — matches PageSkeleton for FMLY.
        Visible at HTML parse time (~0ms). React replaces this on mount.
        Uses inline styles with raw dark-theme values so it works before
        CSS loads. Intentionally minimal — just enough to prevent white flash.
      -->
      <script>!function(){try{var t=localStorage.getItem("tfm-theme")||"dark";document.documentElement.classList.add(t);var c=document.cookie.match(/(?:^|;\s*)sidebar:state=([^;]*)/);var v=c&&decodeURIComponent(c[1])==="false"?"3rem":"11rem";document.documentElement.style.setProperty("--shell-sidebar-w",v);var p=location.pathname.replace(/^\//,"").split("/").filter(Boolean);if(p.length===3){document.documentElement.dataset.embed="1"}var m=window.innerWidth<768;var w=window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches||navigator.standalone===true;var s=p.length<=1||p[0]==="fmly"||p[0]==="CrowdFit";if(m&&s){document.documentElement.dataset.reels="1"}}catch(e){document.documentElement.classList.add("dark")}}()</script>
      <style>
        .shell{display:flex;height:100svh;overflow:hidden;background:#f9f9f9;color-scheme:light}
        .dark .shell{background:#090a10;color-scheme:dark}
        [data-embed="1"] .shell{display:none}
        .shell-main{flex:1;display:flex;flex-direction:column;min-height:0}
        .shell-header{display:flex;align-items:center;gap:0.75rem;height:3rem;padding:0 0.75rem;border-bottom:1px solid rgba(0,0,0,0.06);background:rgba(249,249,249,0.8)}
        .dark .shell-header{border-bottom-color:rgba(255,255,255,0.06);background:rgba(9,10,16,0.8)}
        .shell-pill{font-family:monospace;font-size:11px;letter-spacing:0.1em;color:rgba(0,0,0,0.45)}
        .dark .shell-pill{color:rgba(255,255,255,0.5)}
        .shell-content{flex:1;padding:1rem 1rem 1.5rem;overflow:hidden}
        .shell-card{border-bottom:1px solid rgba(0,0,0,0.06);padding-bottom:0.75rem;margin-bottom:0.75rem}
        .dark .shell-card{border-bottom-color:rgba(255,255,255,0.04)}
        .shell-row{display:flex;align-items:center;gap:0.75rem;padding:0.625rem 0.75rem}
        .shell-circle{border-radius:9999px;background:rgba(0,0,0,0.06)}
        .dark .shell-circle{background:rgba(255,255,255,0.06)}
        .shell-rect{border-radius:0.25rem;background:rgba(0,0,0,0.06)}
        .dark .shell-rect{background:rgba(255,255,255,0.06)}
        .shell-block{background:rgba(0,0,0,0.04)}
        .dark .shell-block{background:rgba(255,255,255,0.04)}
        .shell-sidebar{display:none}
        @media(min-width:768px){.shell-sidebar{display:block;width:var(--shell-sidebar-w,11rem);flex-shrink:0;border-right:1px solid rgba(0,0,0,0.06);background:#f9f9f9}.dark .shell-sidebar{border-right-color:rgba(255,255,255,0.06);background:#090a10}}
        [data-reels="1"] .shell{background:#000}
        [data-reels="1"] .shell-sidebar{display:none!important}
        [data-reels="1"] .shell-header{display:none}
        [data-reels="1"] .shell-content{padding:0;display:flex;flex-direction:column;height:100%}
        [data-reels="1"] .shell-content>div{max-width:none;margin:0;flex:1;display:flex;flex-direction:column}
        [data-reels="1"] .shell-card{border:0;padding:0;margin:0;flex:1;display:flex;flex-direction:column}
        [data-reels="1"] .shell-card:nth-child(n+2){display:none}
        [data-reels="1"] .shell-card .shell-row{display:none}
        [data-reels="1"] .shell-card .shell-block{flex:1;background:#000}
        [data-reels="1"] .shell-card>div:last-child{display:none}
        [data-reels="1"] .shell-content>div>div:first-child{display:none}
      </style>
      <div class="shell">
        <div class="shell-sidebar"></div>
        <div class="shell-main">
          <div class="shell-header">
            <span class="shell-pill"></span>
          </div>
          <div class="shell-content">
            <div style="max-width:42rem;margin:0 auto">
              <!-- Toggle bar -->

                </div>

                  <div class="shell-circle" style="height:2rem;width:2rem"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
